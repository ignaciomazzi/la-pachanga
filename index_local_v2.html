<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
button{touch-action:manipulation;font-family:inherit;}
:root{
  --bg:#060c06;--sur:#0f1a0f;--sur2:#152015;--bor:#1d391d;--bor2:#254825;
  --txt:#e8f5e8;--txt2:#7eb87e;--txt3:#3d623d;
  --green:#4ade80;--gd:#052e16;--gm:#166534;
  --gold:#fbbf24;--gold-d:#3d2800;--gom:#92400e;
  --orange:#fb923c;--orange-d:#431407;
  --red:#f87171;--rd:#2d0a0a;
  --blue:#38bdf8;--bd:#0c2a3a;
  --purple:#c084fc;--pd:#1a0e3d;
  --c1:#4ade80;--c1d:#052e16;--c1b:#0d3320;
  --c2:#fbbf24;--c2d:#3d2800;--c2b:#2a1a00;
  --c3:#fb923c;--c3d:#431407;--c3b:#2c0d00;
  --r:14px;--r2:20px;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Barlow',system-ui,sans-serif;font-size:15px;line-height:1.4;overscroll-behavior:none;}
/* Anton = display numbers/headers | Barlow Condensed = labels/UI | Barlow = body */
.fa{font-family:'Anton',sans-serif;letter-spacing:.02em;}
.fc{font-family:'Barlow Condensed',sans-serif;}

/* ── Shell ────────────────────────────────────────── */
#shell{max-width:440px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
#app{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;}
#app::-webkit-scrollbar{display:none;}
#mr{position:fixed;inset:0;z-index:999;pointer-events:none;}
#mr:not(:empty){pointer-events:auto;}
/* goal flash */
#gfl{position:fixed;inset:0;background:rgba(74,222,128,.08);pointer-events:none;opacity:0;z-index:998;transition:opacity .15s;}
#gfl.show{opacity:1;}

/* ── Bottom nav ───────────────────────────────────── */
#bnav{height:68px;background:var(--sur);border-top:1px solid var(--bor);display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0;}
#bnav.hidden{display:none;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;cursor:pointer;border:none;background:none;color:var(--txt3);transition:color .15s;}
.nb.act{color:var(--green);}
.nb svg{width:22px;height:22px;}
.nb span{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}

/* ── Page ─────────────────────────────────────────── */
.page{padding:0 0 calc(env(safe-area-inset-bottom,0px)+16px);}

/* ── Cards ────────────────────────────────────────── */
.card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);overflow:hidden;}
.ci{padding:16px;}

/* ── Buttons ──────────────────────────────────────── */
.btn{display:block;width:100%;border:none;border-radius:10px;padding:.8rem;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:.5rem;transition:opacity .1s,transform .1s;-webkit-user-select:none;user-select:none;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
.btn:active{transform:scale(.97);opacity:.88;}
.btn-green{background:var(--green);color:var(--gd);box-shadow:0 4px 16px rgba(74,222,128,.2);}
.btn-gold{background:var(--gold);color:var(--gold-d);}
.btn-ghost{background:transparent;color:var(--txt2);border:1px solid var(--bor);}
.btn-red{background:var(--rd);color:var(--red);border:1.5px solid rgba(248,113,113,.4);}
.btn-dis{background:#0e1a0e;color:#3d623d;cursor:not-allowed;border:1px solid var(--bor);}
.btn-end{background:var(--rd);color:#fca5a5;border:2px solid var(--red);font-size:14px;padding:.85rem;width:100%;border-radius:10px;cursor:pointer;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase;transition:opacity .1s,transform .1s;}
.btn-end:active{transform:scale(.97);}
.btn-ai{background:var(--pd);color:var(--purple);border:1px solid #3b1f6e;border-radius:10px;padding:.55rem 1rem;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .1s;}
.btn-ai:active{opacity:.7;}
.btn-ai.loading{opacity:.6;cursor:not-allowed;}
.btn-sm{background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--txt2);transition:opacity .1s;}
.btn-sm:active{opacity:.6;}
.sbb{background:transparent;border:1px solid var(--bor);border-radius:10px;padding:8px 14px;color:var(--txt2);cursor:pointer;font-size:14px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;transition:opacity .1s;}
.sbb:active{opacity:.6;}

/* ── Inputs ───────────────────────────────────────── */
input[type=text],input[type=date],input[type=password],input[type=number]{background:var(--sur2);border:1.5px solid var(--bor);border-radius:10px;padding:.65rem .9rem;color:var(--txt);font-size:16px;width:100%;outline:none;font-family:inherit;-webkit-appearance:none;margin-bottom:.5rem;}
input:focus{border-color:var(--gold);}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6);}
.lbl{font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;display:block;margin-top:8px;}

/* ── Tags / Badges ────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.bg-green{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.25);}
.bg-gold{background:rgba(251,191,36,.12);color:var(--gold);border:1px solid rgba(251,191,36,.25);}
.bg-blue{background:rgba(56,189,248,.12);color:var(--blue);border:1px solid rgba(56,189,248,.25);}
.bg-dim{background:rgba(255,255,255,.05);color:var(--txt2);border:1px solid var(--bor);}
.bg-red{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25);}
.tag-g{background:#052e16;color:var(--green);padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;}
.tag-b{background:#3d2800;color:var(--gold);padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;}
.tag-o{background:#431407;color:var(--orange);padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;}

/* ── Section label ────────────────────────────────── */
.sec-lbl{padding:20px 16px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);display:flex;align-items:center;gap:8px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--bor);}

/* ── Live dot ─────────────────────────────────────── */
.ldot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pdot 1.4s ease-in-out infinite;flex-shrink:0;}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.65);}}

/* ── Modals ───────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:flex-end;justify-content:center;z-index:999;backdrop-filter:blur(4px);}
.modal{background:var(--sur);border:1px solid var(--bor);border-radius:24px 24px 0 0;padding:0;max-width:440px;width:100%;max-height:88vh;overflow-y:auto;}
.modal-pill{width:36px;height:4px;background:var(--bor2);border-radius:2px;margin:12px auto 0;}
.modal-inner{padding:16px 20px calc(20px + env(safe-area-inset-bottom,0px));}
.modal-title{font-family:'Anton',sans-serif;font-size:20px;letter-spacing:.02em;margin-bottom:14px;color:var(--txt);}
@media(min-width:600px){.modal-bg{align-items:center;}.modal{border-radius:20px;}}

/* ── Spinner ──────────────────────────────────────── */
.spin{display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Progress bar (wizard) ────────────────────────── */
.prog-bar{height:3px;background:var(--bor);border-radius:2px;overflow:hidden;margin-bottom:20px;}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s ease;}

/* ── Player chips (wizard) ────────────────────────── */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.pchip{border-radius:10px;padding:10px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bor);background:var(--sur2);color:var(--txt2);text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:inherit;min-height:40px;transition:transform .1s,opacity .1s;}
.pchip:active{transform:scale(.95);}
.pchip.sg{background:#052e16;border-color:var(--green);color:var(--green);}
.pchip.sb{background:#3d280055;border-color:var(--gold);color:var(--gold);}
.pchip.so{background:#43140755;border-color:var(--orange);color:var(--orange);}
.pchip.taken{opacity:.18;pointer-events:none;}

/* ── Table ────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;font-size:12px;}
td,th{padding:5px 4px;text-align:left;}
th{color:var(--txt3);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bor);font-family:'Barlow Condensed',sans-serif;}

/* ── Standings ────────────────────────────────────── */
.st-row{display:grid;grid-template-columns:22px 1fr 26px 26px 26px 26px 34px;gap:2px;align-items:center;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
.st-row:last-child{border-bottom:none;}
.st-hdr{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);padding:8px 12px;border-bottom:1px solid var(--bor);}
.st-pos{font-weight:700;color:var(--txt3);font-size:12px;}
.st-nm{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.st-num{text-align:center;color:var(--txt2);font-variant-numeric:tabular-nums;}
.st-pts{text-align:center;font-family:'Anton',sans-serif;font-size:16px;}

/* ── Goal btn ─────────────────────────────────────── */
.goal-btn{border-radius:12px;padding:14px 8px;font-size:14px;font-weight:800;cursor:pointer;width:100%;border:2px solid;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .1s,opacity .1s;background:none;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
.goal-btn:active{transform:scale(.93);}

/* ── GK button ────────────────────────────────────── */
.gk-btn{background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--txt2);cursor:pointer;margin-top:6px;transition:opacity .1s,background .15s;display:block;width:100%;text-align:center;font-weight:600;}
.gk-btn.active{color:var(--blue);border-color:rgba(56,189,248,.4);background:rgba(56,189,248,.08);}

/* ── Player rows ──────────────────────────────────── */
.prow{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;}
.player-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bor);}

/* ── Score + timer (live) ─────────────────────────── */
.score-num{font-family:'Anton',sans-serif;font-size:80px;letter-spacing:.02em;line-height:1;font-variant-numeric:tabular-nums;transition:transform .15s cubic-bezier(.34,1.56,.64,1);}
.score-num.bump{animation:sbump .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes sbump{0%{transform:scale(1);}40%{transform:scale(1.22);color:var(--green);}100%{transform:scale(1);}}
.timer{font-family:'Anton',sans-serif;font-size:52px;font-weight:800;letter-spacing:.02em;font-variant-numeric:tabular-nums;line-height:1;}

/* ── Admin ────────────────────────────────────────── */
.num-ctrl{display:flex;align-items:center;gap:10px;}
.num-ctrl button{background:var(--sur2);border:1px solid var(--bor);border-radius:8px;width:36px;height:36px;font-size:18px;cursor:pointer;color:var(--txt);display:flex;align-items:center;justify-content:center;transition:opacity .1s;}
.num-ctrl button:active{opacity:.6;}
.num-ctrl span{font-family:'Anton',sans-serif;font-size:18px;min-width:32px;text-align:center;}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;border-bottom:1px solid var(--bor);}
.cfg-label{font-size:14px;font-weight:600;}
.cfg-sub{font-size:11px;color:var(--txt3);margin-top:2px;}
.pin-input{font-size:28px;letter-spacing:8px;text-align:center;font-weight:700;background:var(--sur2);border:2px solid var(--bor);border-radius:12px;padding:.75rem;width:100%;color:var(--txt);font-family:monospace;}
.pin-input:focus{border-color:var(--gold);}

/* ── AI ───────────────────────────────────────────── */
.ai-opt{background:var(--sur2);border:1px solid var(--bor);border-radius:12px;padding:.85rem 1rem;margin-bottom:8px;cursor:pointer;text-align:left;transition:background .15s;}
.ai-opt:active{background:#1e2e1e;}
.ai-opt-theme{font-weight:700;font-size:14px;margin-bottom:4px;color:var(--txt);}
.ai-opt-teams{font-size:12px;color:var(--txt2);}

/* ── Profile stat ─────────────────────────────────── */
.profile-stat{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bor);}
.profile-stat-lbl{font-size:13px;color:var(--txt2);}
.profile-stat-val{font-size:15px;font-weight:700;font-family:'Barlow Condensed',sans-serif;}

/* ── Dist bar ─────────────────────────────────────── */
.dist-row{display:flex;align-items:center;gap:8px;padding:5px 0;}
.dist-bar{height:8px;background:var(--green);border-radius:4px;min-width:4px;transition:width .3s;}
/* ── Formation ────────────────────────────────────── */
.formation{display:flex;flex-direction:column;gap:4px;}
.f-row{display:flex;flex-wrap:wrap;gap:4px;}
.f-player{padding:2px 8px;border-radius:6px;font-size:12px;font-weight:600;}
/* ── Team color picker ────────────────────────────── */
.tcolor-pill{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .12s,border-color .12s;flex-shrink:0;display:inline-block;-webkit-appearance:none;appearance:none;}
.tcolor-pill.sel{border-color:#fff;transform:scale(1.25);box-shadow:0 0 0 1px rgba(255,255,255,.4);}
.tcolor-row{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 4px;}

/* ── Podium (rankings) ────────────────────────────── */
.podium-row{display:grid;grid-template-columns:1fr 1fr 1fr;align-items:flex-end;gap:8px;padding:20px 16px 12px;}
.podium-item{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;}
.pod-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;border:2.5px solid;position:relative;}
.pod-av.p1{width:68px;height:height:68px;font-size:24px;background:rgba(251,191,36,.12);border-color:var(--gold);color:var(--gold);box-shadow:0 0 24px rgba(251,191,36,.18);}
.pod-av.p2{width:56px;height:56px;font-size:20px;background:rgba(148,163,184,.08);border-color:#94a3b8;color:#94a3b8;}
.pod-av.p3{width:50px;height:50px;font-size:17px;background:rgba(180,120,60,.08);border-color:#b47c3c;color:#b47c3c;}
.pod-medal{position:absolute;bottom:-5px;right:-3px;font-size:16px;line-height:1;}
.pod-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-align:center;color:var(--txt);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pod-val{font-family:'Anton',sans-serif;font-size:18px;color:var(--txt2);}
.pod-val.p1{color:var(--gold);font-size:22px;}
.pod-base{width:100%;border-radius:8px 8px 0 0;}
.pod-base.p1{height:44px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.18);}
.pod-base.p2{height:32px;background:rgba(148,163,184,.05);border:1px solid rgba(148,163,184,.12);}
.pod-base.p3{height:22px;background:rgba(180,120,60,.05);border:1px solid rgba(180,120,60,.12);}

/* ── Rank list item ───────────────────────────────── */
.rank-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--bor);cursor:pointer;transition:opacity .15s;}
.rank-item:last-child{border-bottom:none;}
.rank-item:active{opacity:.7;}
.rank-pos{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--txt3);width:20px;text-align:center;flex-shrink:0;}
.rank-av{width:38px;height:38px;border-radius:50%;background:var(--sur2);border:1.5px solid var(--bor2);display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:14px;color:var(--txt2);flex-shrink:0;}
.rank-info{flex:1;min-width:0;}

function addGoal(ti){

  const cfg=S.cfg;
  const auto=(cfg.goals>0&&(ns[0]>=cfg.goals||ns[1]>=cfg.goals))||S.secs<0;
  const nm=S.cur.nextMatch;
  const t=ti===0?S.cur.teams.find(t=>t.id===nm.team1):S.cur.teams.find(t=>t.id===nm.team2);
  mGoal(t,S.cur.goals||{},player=>{
    if(!player)return;// tocó fuera del modal — anular acción, no convalidar gol
    if(auto)stopT();
    S.score=ns;
    const nc=cp(S.cur);if(!nc.goals)nc.goals={};nc.goals[player]=(nc.goals[player]||0)+1;
    if(!nc.events)nc.events=[];var _dur=S.cfg.secs||240;var _elapsed=S.secs<=0?_dur:Math.max(0,_dur-S.secs);var _em=Math.floor(_elapsed/60);var _es=_elapsed%60;var _edt=_em+':'+(_es<10?'0':'')+_es;nc.events.push({type:'goal',player:player,team:t.id,matchIdx:nc.matches.length,min:_em,elapsed:_elapsed,displayTime:_edt,ts:Date.now()});
    var _tg=0;Object.values(nc.goals).forEach(function(n){_tg+=n;});
    if(_tg===1){try{var _sx=JSON.parse(localStorage.getItem('pachanga_sync_v1')||'{}');_sx.firstGoaler=player;localStorage.setItem('pachanga_sync_v1',JSON.stringify(_sx));}catch(e){}}
    setCur(nc);
    const t1=S.cur.teams.find(t=>t.id===nm.team1);const t2=S.cur.teams.find(t=>t.id===nm.team2);
    const pr0=document.getElementById('PR0');const pr1=document.getElementById('PR1');
    if(pr0)pr0.innerHTML=mkProws(t1,S.cur.goals);if(pr1)pr1.innerHTML=mkProws(t2,S.cur.goals);
    const glive=document.getElementById('glive');if(glive)glive.innerHTML=mkGoalsLog(S.cur);
    var jso=document.getElementById('jscorers_outer');if(jso){var jsc=mkJScorers(S.cur);jso.innerHTML=jsc?'<div style="background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);overflow:hidden"><div style="padding:7px 12px;font-family:\'Barlow Condensed\',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);border-bottom:1px solid var(--bor)">⚽ Goleadores</div>'+jsc+'</div>':''}
    // score bump + flash
    const sid=ti===0?'SC0':'SC1';const sel=document.getElementById(sid);if(sel){sel.textContent=S.score[ti];sel.classList.remove('bump');void sel.offsetWidth;sel.classList.add('bump');setTimeout(()=>sel.classList.remove('bump'),400);}
    const fl=document.getElementById('gfl');if(fl){fl.classList.add('show');setTimeout(()=>fl.classList.remove('show'),200);}
    if(auto)doResult(ns);
    else{const s0=document.getElementById('SC0'),s1=document.getElementById('SC1');if(s0)s0.textContent=S.score[0];if(s1)s1.textContent=S.score[1];}
  });
}
function undoGoal(){
  vib(30);var cur=S.cur;if(!cur)return;
  var curMatchIdx=cur.matches.length;
  var events=cur.events||[];var lastGoalIdx=-1;
  for(var _i=events.length-1;_i>=0;_i--){if(events[_i].type==='goal'&&events[_i].matchIdx===curMatchIdx){lastGoalIdx=_i;break;}}
  if(lastGoalIdx>=0){
    var lastEvt=events[lastGoalIdx];var nc=cp(cur);
    nc.events.splice(lastGoalIdx,1);
    if(lastEvt.player&&nc.goals&&nc.goals[lastEvt.player]>0){nc.goals[lastEvt.player]--;if(nc.goals[lastEvt.player]===0)delete nc.goals[lastEvt.player];}
    setCur(nc);
    var nm_=nc.nextMatch;var isT1=lastEvt.team===nm_.team1;var n=[...S.score];
    if(isT1&&n[0]>0)n[0]--;else if(!isT1&&n[1]>0)n[1]--;
    S.score=n;
    var s0=document.getElementById('SC0'),s1=document.getElementById('SC1');if(s0)s0.textContent=S.score[0];if(s1)s1.textContent=S.score[1];
    var t1_=nc.teams.find(function(t){return t.id===nm_.team1;});var t2_=nc.teams.find(function(t){return t.id===nm_.team2;});
    var pr0=document.getElementById('PR0'),pr1=document.getElementById('PR1');
    if(pr0)pr0.innerHTML=mkProws(t1_,nc.goals);if(pr1)pr1.innerHTML=mkProws(t2_,nc.goals);
    var glive=document.getElementById('glive');if(glive)glive.innerHTML=mkGoalsLog(nc);
    var jso2=document.getElementById('jscorers_outer');if(jso2){var jsc2=mkJScorers(nc);jso2.innerHTML=jsc2?'<div style="background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);overflow:hidden"><div style="padding:7px 12px;font-family:\'Barlow Condensed\',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);border-bottom:1px solid var(--bor)">⚽ Goleadores</div>'+jsc2+'</div>':'';}
  } else {

    var s0=document.getElementById('SC0'),s1=document.getElementById('SC1');if(s0)s0.textContent=S.score[0];if(s1)s1.textContent=S.score[1];
  }
}

function doResult(s){
  s=s||S.score;stopT();
  const nm=S.cur.nextMatch;
  const t1=S.cur.teams.find(t=>t.id===nm.team1);const t2=S.cur.teams.find(t=>t.id===nm.team2);const tr=S.cur.teams.find(t=>t.id===nm.resting);
  const isDraw=s[0]===s[1];const isFirstMatch=S.cur.matches.length===0;const showDrawChoice=isDraw&&isFirstMatch;
  const leaving=s[0]>s[1]?t2.name:s[1]>s[0]?t1.name:t1.name;
  mResult({t1:t1.name,t2:t2.name,s1:s[0],s2:s[1],leaving,entering:tr?tr.name:'',t1id:nm.team1,t2id:nm.team2,isDraw:showDrawChoice,autoDrawStays:isDraw&&!isFirstMatch?t2.name:null,autoDrawLeaves:isDraw&&!isFirstMatch?t1.name:null},function(staysId){
    const nc=cp(S.cur);
    const match={team1:nm.team1,team2:nm.team2,resting:nm.resting,score1:s[0],score2:s[1],gk:nc.gk?cp(nc.gk):{}};
    nc.matches=[...(nc.matches||[]),match];
    nc.standings=apM(nc.standings,match);
    const nm2=staysId?{team1:staysId,team2:nm.resting,resting:staysId===nm.team1?nm.team2:nm.team1}:nxM({team1:nm.team1,team2:nm.team2,resting:nm.resting,score1:s[0],score2:s[1]});

async function callAI(prompt){
  const key=gk_();if(!key)throw new Error('NO_KEY');
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-allow-browser':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});
  if(!r.ok)throw new Error('API '+r.status);
  const d=await r.json();return(d.content&&d.content[0]&&d.content[0].text)||'';
}
async function genTemas(){
  if(S.wiz.aiL)return;S.wiz.aiL=true;render();

async function genNom(i){

function stHTML(teams,standings,championId){
  var sorted=srtT(teams,standings);
  if(championId&&sorted.length>=2){
    var champIdx=sorted.findIndex(function(t){return t.id===championId;});
    if(champIdx>0&&isTie(sorted,standings)){
      var a=standings[sorted[0].id]||{pts:0,gf:0,ga:0};var b=standings[sorted[champIdx].id]||{pts:0,gf:0,ga:0};
      if(a.pts===b.pts&&(a.gf-a.ga)===(b.gf-b.ga)){var champ=sorted.splice(champIdx,1)[0];sorted.unshift(champ);}
    }
  }
  var rows=sorted.map(function(t,i){var s=standings[t.id]||{pts:0,pj:0,w:0,d:0,l:0,gf:0,ga:0};var ci=teams.indexOf(t);var c=tclr(t,ci>=0?ci:0);
    return'<div class="st-row">'
      +'<div class="st-pos">'+(i+1)+'</div>'
      +'<div class="st-nm" style="color:'+tcSafe(c)+'">'+(championId&&t.id===championId&&i===0?'★':'')+esc(t.name)+'</div>'
      +'<div class="st-num" style="color:var(--green);font-weight:700">'+( s.w||0)+'</div>'
      +'<div class="st-num" style="color:var(--gold)">'+( s.d||0)+'</div>'
      +'<div class="st-num" style="color:var(--red)">'+( s.l||0)+'</div>'
      +'<div class="st-num">'+s.pj+'</div>'
      +'<div class="st-pts" style="color:'+(i===0?'var(--gold)':'var(--txt)')+'">'+s.pts+'</div></div>';
  }).join('');
  var hdr='<div class="st-hdr" style="display:grid;grid-template-columns:22px 1fr 26px 26px 26px 26px 34px;gap:2px"><span>#</span><span>Equipo</span><span style="text-align:center;color:var(--green)">G</span><span style="text-align:center;color:var(--gold)">E</span><span style="text-align:center;color:var(--red)">P</span><span style="text-align:center">PJ</span><span style="text-align:center">PTS</span></div>';
  return hdr+'<div style="display:flex;flex-direction:column">'+rows+'</div>';
}

function vSetup(){
  const w=S.wiz,step=w.step;const nTeams=S.cfg.nTeams||3;
  // step 0=jugadores, 2..N+1=equipos (step 1/info movido a vWaiting)
  const totalDisplay=1+nTeams;
  const displayStep=step===0?1:step-1;
  const pct=Math.round((displayStep/totalDisplay)*100);
  const stepNames=['Jugadores',...Array.from({length:nTeams},(_,i)=>'Equipo '+(i+1))];
  const stepLabel=stepNames[displayStep-1]||'';
  let body='';
  if(step===0){
    const avpl=w.availPlayers||[];const avCnt=avpl.length;
    const avGrid=sbl(S.players).map((p,j)=>{const sel=avpl.includes(p);return'<button id="avp'+j+'" class="pchip'+(sel?' sg':'')+'">'+esc(dn(p))+'</button>';}).join('');
    body='<div style="margin-bottom:10px">'
      +'<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px">¿Quiénes juegan hoy?</div>'
      +'<div style="font-size:13px;color:var(--txt2);margin-bottom:10px">Seleccioná a cada jugador que está esta noche.</div>'
      +'<label class="lbl" style="margin-top:0">Fecha</label>'
      +'<input type="date" id="wdt0" value="'+esc(w.date)+'" style="margin-bottom:10px">'
      +'<div style="font-size:13px;font-weight:700;color:'+(avCnt>0?'var(--green)':'var(--txt3)')+'">Seleccionados: '+avCnt+' / '+S.players.length+'</div>'
      +'</div>'
      +'<div class="pgrid">'+avGrid+'</div>'
      +'<div style="display:flex;gap:8px;margin-bottom:1rem"><button id="avall" class="btn-sm">Todos</button><button id="avnone" class="btn-sm" style="color:var(--red)">Ninguno</button></div>'
      +'<button id="wn0" class="btn '+(avCnt>=3?'btn-green':'btn-dis')+'" '+(avCnt>=3?'':'disabled')+'>Siguiente →</button>';
  } else if(step===1){
    const hasKey=!!gk_();
    body='<div style="margin-bottom:20px">'
      +'<label class="lbl" style="margin-top:0">Fecha</label>'
      +'<input type="date" id="wdt" value="'+esc(w.date)+'">'
      +'<label class="lbl">Temática</label>'
      +'<div style="display:flex;gap:8px;margin-bottom:6px;align-items:center"><input type="text" id="wth" placeholder="ej: Gasistas vs Mecánicos vs Plomeros" value="'+esc(w.theme)+'" style="flex:1;margin-bottom:0">'
      +(hasKey?'<button id="waigt" class="btn-ai '+(w.aiL?'loading':'')+'">'+( w.aiL?'<span class="spin">⟳</span>':'✨')+'</button>':'')
      +'</div>'
      +(!hasKey?'<div style="font-size:12px;color:var(--txt3)">→ Configurá la IA para generar temáticas automáticamente</div>':'')
      +'</div>'
      +'<button id="wn0" class="btn '+(w.date&&w.theme.trim()?'btn-green':'btn-dis')+'" '+(w.date&&w.theme.trim()?'':'disabled')+'>Siguiente →</button>';
  } else {
    const i=step-2;const t=w.teams[i];
    const hex=tclr(t,i);const sel=CSEL[i]||CSEL[CSEL.length-1];
    const takenAll=new Set(w.teams.flatMap((tm,ti)=>ti!==i?tm.players:[]));
    const srcPlayers=sbl(w.availPlayers&&w.availPlayers.length?w.availPlayers:S.players);
    const chips=srcPlayers.map((p,j)=>{const taken=takenAll.has(p);const chosen=t.players.includes(p);return'<button id="pc'+j+'" class="pchip'+(chosen?' '+sel:taken?' taken':'')+'" title="'+esc(dn(p))+'">'+esc(dn(p))+'</button>';}).join('');
    const aiNL=w.aiNL===i;const hasKey=!!gk_();
    const ok=!!(t&&t.players.length>=3);
    body='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
      +'<div style="width:12px;height:12px;border-radius:50%;background:'+hex+'"></div>'
      +'<label class="lbl" style="margin:0;flex:1">Nombre del equipo '+(i+1)+(i===0?' (Campeón defensor)':'')+'</label>'
      +'</div>'
      +'<input type="text" id="wnm" value="'+esc(t.name||'')+'" placeholder="Nombre del equipo (opcional)" style="border-color:'+hex+'55">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin:10px 0 6px"><label class="lbl" style="margin:0">Jugadores ('+t.players.length+'/'+(S.cfg.ppt||5)+')</label></div>'
      +'<div class="pgrid">'+chips+'</div>'
      +'<button id="wni" class="btn" style="background:'+(ok?hex:'#0e1a0e')+';color:'+(ok?(i===0?'var(--gd)':i===1?'var(--gold-d)':'var(--orange-d)'):'#3d623d')+';border:'+(ok?'none':'1px solid var(--bor)')+'">'+(step===nTeams+1?'✓ Confirmar equipos':'Siguiente →')+'</button>';
  }
  return'<div class="page">'
    +'<div style="padding:18px 16px 0;display:flex;align-items:center;gap:10px;margin-bottom:16px">'
    +'<button id="wbk" class="sbb">←</button>'
    +'<div style="flex:1"><div style="font-family:\'Anton\',sans-serif;font-size:20px">Nueva Jornada</div><div style="font-size:12px;color:var(--txt3);margin-top:2px">'+stepLabel+' · Paso '+displayStep+' de '+totalDisplay+'</div></div>'
    +'</div>'
    +'<div style="padding:0 16px"><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'
    +body+'</div></div>';
}

function vWaiting(){
  const cur=S.cur;if(!cur)return'<div class="page"><p style="padding:20px">Sin jornada.</p></div>';
  const nTeams=cur.teams.length;const ri=_waitRi;
  const canStart=S.admUnlocked||!S.cfg.pin;
  const riOk=nTeams===2||(ri>=0&&ri<nTeams);
  const ps=computeStats();

  const teamsHTML=cur.teams.map((t,i)=>{
    const c=tclr(t,i);const sc=CSEL[i]||CSEL[CSEL.length-1];
    const plRows=(t.players||[]).filter(p=>p).map(p=>{const st=ps[p]||{goals:0,pj:0,champ:0};return'<div style="display:flex;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)">'
      +'<span style="flex:1;font-size:13px;font-weight:600;color:var(--txt)">'+esc(nick(p))+'</span>'
      +'<span style="font-size:11px;color:var(--txt3);margin-right:4px">PJ '+st.pj+'</span>'
      +'<span style="font-size:11px;'+(st.goals>0?'color:var(--green);font-weight:700':'color:var(--txt3);filter:grayscale(1)')+';margin-right:4px">⚽'+(st.goals||0)+'</span>'
      +'<span style="font-size:11px;'+(st.champ>0?'color:var(--gold)':'color:var(--txt3);filter:grayscale(1)')+'">🏆'+(st.champ||0)+'</span>'
      +'</div>';}).join('');
    const colorPills=TEAM_COLORS.map(function(tc_,tci){var selColor=t.color||CHX[i]||CHX[0];var sel=tc_.h===selColor;if(tc_.lc&&tc_.rc){return'<button id="wclr_'+i+'_'+tci+'" class="tcolor-pill'+(sel?' sel':'')+'" style="position:relative;overflow:hidden;padding:0" title="'+tc_.n+'"><span style="position:absolute;left:0;top:0;width:50%;height:100%;background:'+tc_.lc+';pointer-events:none"></span><span style="position:absolute;right:0;top:0;width:50%;height:100%;background:'+tc_.rc+';pointer-events:none"></span></button>';}return'<button id="wclr_'+i+'_'+tci+'" class="tcolor-pill'+(sel?' sel':'')+'" style="background:'+tc_.h+'" title="'+tc_.n+'"></button>';}).join('');
    return'<div style="margin:0 16px 10px;background:'+c+'08;border:1px solid '+c+'33;border-radius:var(--r);padding:14px 16px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      +'<span class="tag-'+(['g','b','o'][i]||'g')+'">Equipo '+(i+1)+'</span>'
      +'<input type="text" id="wtname_'+i+'" value="'+esc(t.name)+'" placeholder="'+(i===0?'Campeón defensor':'Nombre opcional')+'" style="flex:1;margin:0;background:transparent;border:none;border-bottom:1.5px solid '+c+'66;border-radius:0;padding:3px 0;font-family:\'Barlow Condensed\',sans-serif;font-size:16px;font-weight:700;color:var(--txt);outline:none">'
      +'</div>'
      +plRows
      +'<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05)"><div style="font-size:10px;color:var(--txt3);font-weight:600;letter-spacing:.4px;margin-bottom:6px">COLOR</div><div class="tcolor-row">'+colorPills+'</div></div>'
      +'</div>';
  }).join('');

  const restingHTML=nTeams>2
    ?'<div class="sec-lbl">¿Quién descansa primero?</div><div style="margin:0 16px 12px">'
      +cur.teams.map((t,i)=>{const sel=ri===i;const c=CHX[i]||CHX[CHX.length-1];return'<button id="wri'+i+'" class="btn" style="background:'+(sel?c+'22':'var(--sur)')+';color:'+(sel?c:'var(--txt2)')+';border:1.5px solid '+(sel?c:'var(--bor)')+';margin-bottom:8px;display:flex;align-items:center;gap:10px;text-align:left"><span style="font-size:16px">'+(sel?'●':'○')+'</span><span style="font-family:\'Barlow Condensed\',sans-serif;font-weight:700">Descansa: '+esc(t.name||'Equipo '+(i+1))+'</span></button>';}).join('')+'</div>'

  let startBtn='';
  if(!canStart){startBtn='<div style="margin:0 16px"><button id="wadmpin" class="btn btn-ghost">🔒 Desbloquear para arrancar</button></div>';}
  else if(!riOk&&nTeams>2){startBtn='<div style="margin:0 16px"><button class="btn btn-dis" disabled>Elegí quién descansa para arrancar</button></div>';}
  else{startBtn='<div style="margin:0 16px"><button id="wgo" class="btn btn-green" style="padding:18px;font-size:16px">▶ Arrancar Jornada</button></div>';}

    +'</div>'

    +'<div style="font-size:10px;color:var(--txt3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">TEMÁTICA <span style="font-weight:400;color:var(--txt3)">(opcional)</span></div>'
    +'<input type="text" id="wt_theme" value="'+esc(cur.theme||'')+'" placeholder="ej: Gasistas vs Mecánicos vs Plomeros" style="margin:0;background:transparent;border:none;border-bottom:1.5px solid rgba(74,222,128,.3);border-radius:0;padding:4px 0;color:var(--txt);font-size:14px;outline:none;width:100%">'
    +'</div>'
    +'<div class="sec-lbl">Equipos</div>'
    +teamsHTML+restingHTML+startBtn
    +'<div style="height:16px"></div></div>';
}

function vLive(){

    +'<div id="SC1" class="score-num">'+S.score[1]+'</div>'

function g(id){return document.getElementById(id);}
function on(id,fn){const el=g(id);if(el)el.onclick=fn;}

function migratePlayerName(oldName,newName){
  if(!oldName||!newName||oldName===newName)return;
  function mj(j){
    (j.teams||[]).forEach(function(t){if(t.players){for(var i=0;i<t.players.length;i++){if(t.players[i]===oldName)t.players[i]=newName;}}});
    if(j.goals&&j.goals[oldName]!==undefined){j.goals[newName]=(j.goals[newName]||0)+j.goals[oldName];delete j.goals[oldName];}
    (j.events||[]).forEach(function(e){if(e.player===oldName)e.player=newName;});
    if(j.mvp===oldName)j.mvp=newName;
    if(j.gk){var gk2={};Object.keys(j.gk).forEach(function(k){gk2[k]=j.gk[k]===oldName?newName:j.gk[k];});j.gk=gk2;}
    (j.matches||[]).forEach(function(m){if(m.gk){Object.keys(m.gk).forEach(function(k){if(m.gk[k]===oldName)m.gk[k]=newName;});}});
    return j;
  }
  if(S.hist&&S.hist.length){var nh=S.hist.map(function(j){return mj(cp(j));});S.hist=nh;sh(nh);}
  if(S.cur){var nc=mj(cp(S.cur));setCur(nc);}
}
function saveEdit(){
  const ei=g('eei'),en=g('eenk');
  const n=(ei?ei.value.trim():S.eval_);const nk=(en?en.value.trim():S.enick);
  if(n){
    const old=S.eplist[S.eidx];
    const newNicks=Object.assign({},S.nicks);
    if(old!==n){delete newNicks[old];}
    if(nk){newNicks[n]=nk;}else{delete newNicks[n];}
    S.nicks=newNicks;svNicks(newNicks);
    if(old!==n)migratePlayerName(old,n);
    S.eplist[S.eidx]=n;S.eplist=sbl([...S.eplist]);S.eidx=null;render();
  }
}

function attach(){
  const v=S.view;
  if(v==='home'){
    on('hnew',()=>go('setup'));
    on('hcont',()=>go(S.cur&&S.cur.nextMatch?'live':'waiting'));
    on('hrk',()=>go('ranks'));on('hpl',()=>go('players'));
    on('hak',()=>go('apikey'));on('hadm',()=>go('admin'));
    on('hdel',()=>mConfirm('¿Borrar la jornada?','Se perderán todos los datos.',()=>{setCur(null);render();},'Borrar','btn-red'));
  }
  if(v==='setup'){
    const w=S.wiz,step=w.step;const nTeams=S.cfg.nTeams||3;
    on('wbk',()=>{if(step===0){go('home');}else if(step===2){S.wiz.step=0;render();window.scrollTo(0,0);}else{S.wiz.step=step-1;render();window.scrollTo(0,0);}});
    if(step===0){
      // step 0: jugadores disponibles
      const srcPl=sbl(S.players);
      srcPl.forEach((p,j)=>{on('avp'+j,()=>{vib(20);const avp=S.wiz.availPlayers||[];const idx=avp.indexOf(p);if(idx>=0)avp.splice(idx,1);else avp.push(p);S.wiz.availPlayers=avp;render();});});
      on('avall',()=>{S.wiz.availPlayers=sbl([...S.players]);render();});
      on('avnone',()=>{S.wiz.availPlayers=[];render();});
      const _d0=g('wdt0');if(_d0){_d0.oninput=e=>{S.wiz.date=e.target.value;};}
      on('wn0',()=>{if((S.wiz.availPlayers||[]).length>=3){S.wiz.step=2;render();window.scrollTo(0,0);}});
    }
    if(step===1){
      // step 1: info (fecha + temática)
      const di=g('wdt'),ti=g('wth');
      const upd1=()=>{const b=g('wn0');if(!b)return;const ok=!!(S.wiz.date&&S.wiz.theme.trim());b.disabled=!ok;b.className='btn '+(ok?'btn-green':'btn-dis');};
      if(di){di.value=w.date;di.oninput=e=>{S.wiz.date=e.target.value;upd1();};}
      if(ti){ti.value=w.theme;ti.oninput=e=>{S.wiz.theme=e.target.value;upd1();};}
      on('waigt',()=>genTemas());
      on('wn0',()=>{if(S.wiz.date&&S.wiz.theme.trim()){S.wiz.step=2;render();window.scrollTo(0,0);}});
    }
    if(step>=2&&step<=nTeams+1){
      const i=step-2;const ni=g('wnm');
      const srcPlayers=sbl(w.availPlayers&&w.availPlayers.length?w.availPlayers:S.players);
      if(ni){ni.value=w.teams[i].name;ni.oninput=e=>{S.wiz.teams[i].name=e.target.value;};}
      on('wainm',()=>genNom(i));
      srcPlayers.forEach((p,j)=>{on('pc'+j,()=>{vib(20);const pl=S.wiz.teams[i].players;const idx=pl.indexOf(p);if(idx>=0)pl.splice(idx,1);else if(pl.length<(S.cfg.ppt||5))pl.push(p);render();});});
      on('wni',()=>{if(S.wiz.teams[i]&&S.wiz.teams[i].players.length>=3){if(!S.wiz.teams[i].name.trim())S.wiz.teams[i].name='Equipo '+(i+1);if(step===nTeams+1){var w_=S.wiz;if(S.cur){var nc2=cp(S.cur);nc2.teams=cp(w_.teams);nc2.standings=iSt(nc2.teams);nc2.nextMatch=null;nc2.gk={};_waitRi=-1;setCur(nc2);}else{var j_={id:gid(),date:fmtDate(w_.date),theme:'',teams:w_.teams,matches:[],goals:{},standings:iSt(w_.teams),status:'active',champion:null,mvp:null,nextMatch:null,gk:{}};_waitRi=-1;syncBets(j_,'setup');setCur(j_);}go('waiting');}else{S.wiz.step=step+1;render();window.scrollTo(0,0);}}});
    }
  }
  if(v==='waiting'){
    on('wvhm',function(){
      if(S.cur){
        var nT=S.cur.teams.length;
        if(!S.wiz){S.wiz={step:0,date:todayISO(),theme:S.cur.theme||'',teams:cp(S.cur.teams),ri:_waitRi,aiL:false,aiNL:null,availPlayers:S.cur.teams.reduce(function(a,t){return a.concat(t.players||[]);},[])};}
        S.wiz.teams=cp(S.cur.teams);S.wiz.theme=S.cur.theme||'';
        S.wiz.step=nT+1;S.view='setup';render();window.scrollTo(0,0);
      }else{mConfirm('¿Volver al inicio?','Se perderá la configuración de equipos.',function(){setCur(null);go('home');},'Salir','btn-ghost');}
    });
    on('wres',mResumen);
    var _wc=S.cur;if(_wc){
      // Theme input — update without full re-render to preserve focus
      var _ti=g('wt_theme');
      if(_ti){_ti.oninput=function(e){if(S.cur){S.cur.theme=e.target.value;sc(S.cur);}};}
      _wc.teams.forEach(function(t,i){
        // Team name input
        (function(_i){var ni=g('wtname_'+_i);if(ni){ni.oninput=function(e){if(S.cur&&S.cur.teams[_i]){S.cur.teams[_i].name=e.target.value;sc(S.cur);}};}})(i);
        on('wri'+i,function(){_waitRi=i;render();});
        TEAM_COLORS.forEach(function(tc_,tci){
          on('wclr_'+i+'_'+tci,function(){var nc=cp(S.cur);nc.teams[i].color=tc_.h;setCur(nc);render();});
        });
      });
    }
    on('wgo',function(){var _wc2=S.cur;if(!_wc2)return;var _nc=cp(_wc2);if(_wc2.teams.length===2){_nc.nextMatch={team1:_wc2.teams[0].id,team2:_wc2.teams[1].id,resting:null};}else{if(_waitRi<0)return;var _pl=_wc2.teams.map(function(_,idx){return idx;}).filter(function(x){return x!==_waitRi;});_nc.nextMatch={team1:_wc2.teams[_pl[0]].id,team2:_wc2.teams[_pl[1]].id,resting:_wc2.teams[_waitRi].id};}setCur(_nc);syncBets(_nc,'start');go('live');});
    on('wadmpin',()=>{go('admin');});
  }
  if(v==='live'){
    on('lvhm',()=>mConfirm('Salir a inicio','La jornada queda guardada. Podés retomar el partido.',()=>go('home'),'Salir','btn-ghost'));on('lv_gear',mLiveMenu);on('TB',togT);on('TR',rstT);on('G0',()=>addGoal(0));on('G1',()=>addGoal(1));
    on('GK0',()=>{const nm=S.cur.nextMatch;const t1=S.cur.teams.find(t=>t.id===nm.team1);const curGK=(S.cur.gk||{})[nm.team1]||null;mGK(t1,curGK,p=>{const nc=cp(S.cur);if(!nc.gk)nc.gk={};if(p)nc.gk[nm.team1]=p;else delete nc.gk[nm.team1];setCur(nc);render();});});
    on('GK1',()=>{const nm=S.cur.nextMatch;const t2=S.cur.teams.find(t=>t.id===nm.team2);const curGK=(S.cur.gk||{})[nm.team2]||null;mGK(t2,curGK,p=>{const nc=cp(S.cur);if(!nc.gk)nc.gk={};if(p)nc.gk[nm.team2]=p;else delete nc.gk[nm.team2];setCur(nc);render();});});
    on('lvem',()=>{const nm=S.cur.nextMatch;const a=(S.cur.teams.find(t=>t.id===nm.team1)||{}).name||'?';const b=(S.cur.teams.find(t=>t.id===nm.team2)||{}).name||'?';mConfirm('¿Terminar el partido?',a+' '+S.score[0]+' — '+S.score[1]+' '+b,()=>doResult(),'Terminar','btn-green');});
    on('lvun',()=>mConfirm('¿Cancelar el último gol?','',()=>undoGoal(),'¿Sí, cancelar','btn-red'));
    on('lvep',()=>mConfirm('¿Terminar la Pachanga?','Se elegirá el MVP y se guardan las posiciones.',()=>{stopT();go('end');},'Sí, terminar','btn-red'));
    if(S.running&&!TID)startT();
  }
  if(v==='end'){
    on('ebk',()=>go('live'));on('ebk2',()=>go('live'));
    const _openMVP=()=>{const pl=[...new Set(S.cur.teams.flatMap(t=>(t.players||[]).filter(p=>p&&p.trim())))];mMVP(pl,p=>{const nc=cp(S.cur);nc.mvp=p;setCur(nc);render();});};
    on('emvpb',_openMVP);on('echm',_openMVP);
    on('esv',()=>{const sorted=srtT(S.cur.teams,S.cur.standings);const nc=cp(S.cur);nc.status='done';nc.champion=sorted[0].id;setHist([...S.hist,nc]);setCur(null);go('home');});
    srtT(S.cur.teams,S.cur.standings).forEach((t,i)=>{on('td'+i,()=>{const nc=cp(S.cur);nc.status='done';nc.champion=t.id;setHist([...S.hist,nc]);setCur(null);go('home');});});
    on('tdno',()=>{const nc=cp(S.cur);nc.status='done';nc.champion=null;setHist([...S.hist,nc]);setCur(null);go('home');});
  }
  if(v==='ranks'){
    ['hist','ideal','goles','perfiles'].forEach(k=>on('rt'+k,()=>{S.rtab=k;render();}));
    if(S.rtab==='hist'){[...S.hist].reverse().forEach((j,ri)=>{const jIdx=S.hist.length-1-ri;on('rmvp'+ri,()=>{const pl=[...new Set((j.teams||[]).flatMap(t=>(t.players||[]).filter(p=>p&&p.trim())))];mMVP(pl,p=>{S.hist[jIdx].mvp=p;setHist(S.hist);render();});});on('rdet'+ri,()=>{S.selJornada=jIdx;S.view='jornada';render();window.scrollTo(0,0);});on('rdel'+ri,()=>{mConfirm('¿Eliminar jornada?',esc(j.theme||j.date)+' — se perderá permanentemente.',()=>{const nh=S.hist.filter((_,i)=>i!==jIdx);setHist(nh);render();},'Eliminar','btn-red');});});}
    const ps=computeStats();const cr=Object.entries(ps).sort((a,b)=>b[1].champ-a[1].champ||b[1].mvps-a[1].mvps);const gr=Object.entries(ps).filter(([,s])=>s.goals>0).sort((a,b)=>b[1].goals-a[1].goals);
    cr.forEach(([p],i)=>{on('prp'+i,()=>mProfile(p));});
    if(S.rtab==='goles'){
      gr.forEach(function(entry,i){on('gprf'+i,function(){mProfile(entry[0]);});});
      on('gexpall',function(){_gExpAll=!_gExpAll;render();});
    } else {
      gr.forEach(([p],i)=>{on('gprf'+i,()=>mProfile(p));});
    }
    sbl(S.players).forEach((_,i)=>on('plprf'+i,()=>mProfile(sbl(S.players)[i])));
  }
  if(v==='jornada'){
    on('jvbk',()=>{S.view='ranks';S.rtab='hist';render();window.scrollTo(0,0);});
    on('jvedit',()=>{S.editJ=cp(S.hist[S.selJornada]);S.view='editjornada';render();window.scrollTo(0,0);});
  }
  if(v==='editjornada'){
    var ej=S.editJ;if(!ej)return;
    on('ejbk',function(){S.view='jornada';render();window.scrollTo(0,0);});
    (ej.matches||[]).forEach(function(m,idx){
      on('ej_s1p'+idx,function(){S.editJ.matches[idx].score1++;recomputeJornada(S.editJ);render();});
      on('ej_s1m'+idx,function(){if(S.editJ.matches[idx].score1>0){S.editJ.matches[idx].score1--;recomputeJornada(S.editJ);render();}});
      on('ej_s2p'+idx,function(){S.editJ.matches[idx].score2++;recomputeJornada(S.editJ);render();});
      on('ej_s2m'+idx,function(){if(S.editJ.matches[idx].score2>0){S.editJ.matches[idx].score2--;recomputeJornada(S.editJ);render();}});
      on('ej_mdel'+idx,function(){mConfirm('¿Eliminar partido '+(idx+1)+'?','Se recalcularán las posiciones.',function(){S.editJ.matches.splice(idx,1);recomputeJornada(S.editJ);render();},'Eliminar','btn-red');});
    });
    var _ejAllPl=[];((ej.teams)||[]).forEach(function(t){(t.players||[]).forEach(function(p){if(p&&_ejAllPl.indexOf(p)<0)_ejAllPl.push(p);});});_ejAllPl=sbl(_ejAllPl);
    _ejAllPl.forEach(function(p,pi){
      on('ej_gp'+pi,function(){if(!S.editJ.goals)S.editJ.goals={};S.editJ.goals[p]=(S.editJ.goals[p]||0)+1;render();});
      on('ej_gm'+pi,function(){if(S.editJ.goals&&S.editJ.goals[p]>0){S.editJ.goals[p]--;if(S.editJ.goals[p]===0)delete S.editJ.goals[p];}render();});
    });
    on('ej_gadd',function(){var sel=g('ej_gsel');if(sel&&sel.value){var p=sel.value;if(!S.editJ.goals)S.editJ.goals={};S.editJ.goals[p]=(S.editJ.goals[p]||0)+1;render();}});
    (ej.teams||[]).forEach(function(t,i){on('ej_ch'+i,function(){S.editJ.champion=t.id;render();});});
    on('ej_chno',function(){S.editJ.champion=null;render();});
    _ejAllPl.forEach(function(p,pi){on('ej_mvp'+pi,function(){S.editJ.mvp=p;render();});});
    on('ej_mvpno',function(){S.editJ.mvp=null;render();});
    on('ej_save',function(){var nh=cp(S.hist);nh[S.selJornada]=S.editJ;setHist(nh);S.view='jornada';render();window.scrollTo(0,0);});
  }
  if(v==='players'){
    on('ephm',()=>go('home'));
    const ni=g('epni');if(ni){ni.value=S.enew;ni.oninput=e=>S.enew=e.target.value;ni.onkeydown=e=>{if(e.key==='Enter'){const n=S.enew.trim();if(n&&!S.eplist.includes(n)){S.eplist=sbl([...S.eplist,n]);S.enew='';render();}}};}
    on('epna',()=>{const n=S.enew.trim();if(n&&!S.eplist.includes(n)){S.eplist=sbl([...S.eplist,n]);S.enew='';render();}});
    S.eplist.forEach((_,i)=>{on('ped'+i,()=>{S.eidx=i;S.eval_=S.eplist[i];S.enick=S.nicks[S.eplist[i]]||'';render();setTimeout(()=>{const e=g('eei');if(e)e.focus();},50);});on('pde'+i,()=>mConfirm('¿Eliminar a '+S.eplist[i]+'?','',()=>{S.eplist.splice(i,1);render();},'Eliminar','btn-red'));});
    if(S.eidx!==null){const ei=g('eei'),en=g('eenk');if(ei){ei.value=S.eval_;ei.oninput=e=>S.eval_=e.target.value;ei.onkeydown=e=>{if(e.key==='Enter'&&g('eenk'))g('eenk').focus();};}if(en){en.value=S.enick;en.oninput=e=>S.enick=e.target.value;en.onkeydown=e=>{if(e.key==='Enter')saveEdit();};}on('ees',saveEdit);on('eec',()=>{S.eidx=null;render();});}
    on('epsa',()=>{setPlayers(S.eplist);go('home');});
  }
  if(v==='admin'){
    on('admbk',()=>go('home'));on('admbk2',()=>go('home'));
    if(!S.admUnlocked){
      const pi=g('admpin');
      on('adment',()=>{const entered=(pi?pi.value.trim():'');const pin=S.cfg.pin||'';if(!pin||entered===pin){S.admUnlocked=true;render();}else{vib([100,50,100]);if(pi){pi.value='';pi.style.borderColor='var(--red)';setTimeout(()=>{if(pi)pi.style.borderColor='var(--bor)';},1000);}}});
      return;
    }
    on('nteams_m',()=>{const c=S.cfg;c.nTeams=Math.max(2,c.nTeams-1);svCfg(c);render();});
    on('nteams_p',()=>{const c=S.cfg;c.nTeams=Math.min(4,c.nTeams+1);svCfg(c);render();});
    on('ppt_m',()=>{const c=S.cfg;c.ppt=Math.max(3,c.ppt-1);svCfg(c);render();});
    on('ppt_p',()=>{const c=S.cfg;c.ppt=Math.min(11,c.ppt+1);svCfg(c);render();});
    on('secsm_m',()=>{const c=S.cfg;const m=Math.max(1,Math.round(c.secs/60)-1);c.secs=m*60;svCfg(c);render();});
    on('secsm_p',()=>{const c=S.cfg;const m=Math.min(60,Math.round(c.secs/60)+1);c.secs=m*60;svCfg(c);render();});
    on('goals_m',()=>{const c=S.cfg;c.goals=Math.max(0,(c.goals||2)-1);svCfg(c);render();});
    on('goals_p',()=>{const c=S.cfg;c.goals=Math.min(20,(c.goals||2)+1);svCfg(c);render();});
    on('admpin_save',()=>{const pi=g('admpin_new');const newPin=pi?pi.value.trim():'';S.cfg.pin=newPin;svCfg(S.cfg);const b=g('admpin_save');if(b){b.textContent=newPin?'✓ PIN guardado':'✓ PIN removido';setTimeout(()=>render(),1000);}});
    on('adm_resetp',()=>mConfirm('¿Restaurar jugadores?','Se reemplazará con los jugadores por defecto.',()=>{setPlayers(sbl(DP));render();},'Restaurar','btn-red'));
    on('adm_resth',()=>mConfirm('¿Borrar historial?','Se borrarán TODAS las jornadas. No se puede deshacer.',()=>{S.hist=[];sh([]);render();},'Borrar historial','btn-red'));
  }
  if(v==='apikey'){
    on('akhm',()=>go('home'));
    const ki=g('akpi');if(ki)ki.oninput=e=>S.akval=e.target.value;
    on('aksv',()=>{sk_(S.akval.trim());const b=g('aksv');if(b){b.textContent='✓ Guardada!';b.style.background='var(--green)';}setTimeout(()=>go('home'),900);});
    on('akdl',()=>mConfirm('¿Borrar la API key?','',()=>{sk_('');S.akval='';render();},'Borrar','btn-red'));
  }
}

render();
</script>
</body>
</html>
