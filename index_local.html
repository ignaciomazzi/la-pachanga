    if(S.eidx!==null){const ei=g('eei'),en=g('eenk');if(ei){ei.value=S.eval_;ei.oninput=e=>S.eval_=e.target.value;ei.onkeydown=e=>{if(e.key==='Enter'&&g('eenk'))g('eenk').focus();};}if(en){en.value=S.enick;en.oninput=e=>S.enick=e.target.value;en.onkeydown=e=>{if(e.key==='Enter')saveEdit();};}on('ees',saveEdit);on('eec',()=>{S.eidx=null;render();});}
    on('epsa',()=>{setPlayers(S.eplist);go('home');});
  }
  if(v==='admin'){
    on('admbk',()=>go('home'));on('admbk2',()=>go('home'));
    if(!S.admUnlocked){
      const pi=g('admpin');
      on('adment',()=>{const entered=(pi?pi.value.trim():'');const pin=S.cfg.pin||'';if(!pin||entered===pin){S.admUnlocked=true;render();}else{vib([100,50,100]);if(pi){pi.value='';pi.style.borderColor='var(--red)';setTimeout(()=>{if(pi)pi.style.borderColor='var(--bor)';},1000);}}});
      return;
    }
    // Num controls
    on('nteams_m',()=>{const c=S.cfg;c.nTeams=Math.max(2,c.nTeams-1);svCfg(c);render();});
    on('nteams_p',()=>{const c=S.cfg;c.nTeams=Math.min(4,c.nTeams+1);svCfg(c);render();});
    on('ppt_m',()=>{const c=S.cfg;c.ppt=Math.max(3,c.ppt-1);svCfg(c);render();});
    on('ppt_p',()=>{const c=S.cfg;c.ppt=Math.min(11,c.ppt+1);svCfg(c);render();});
    on('secsm_m',()=>{const c=S.cfg;const m=Math.max(1,Math.round(c.secs/60)-1);c.secs=m*60;svCfg(c);render();});
    on('secsm_p',()=>{const c=S.cfg;const m=Math.min(60,Math.round(c.secs/60)+1);c.secs=m*60;svCfg(c);render();});
    on('goals_m',()=>{const c=S.cfg;c.goals=Math.max(0,(c.goals||2)-1);svCfg(c);render();});
    on('goals_p',()=>{const c=S.cfg;c.goals=Math.min(20,(c.goals||2)+1);svCfg(c);render();});
    on('admpin_save',()=>{const pi=g('admpin_new');const newPin=pi?pi.value.trim():'';S.cfg.pin=newPin;svCfg(S.cfg);const b=g('admpin_save');if(b){b.textContent=newPin?'\u2713 PIN guardado':'\u2713 PIN removido';setTimeout(()=>render(),1000);}});
    on('adm_resetp',()=>mConfirm('\u00bfRestaurar jugadores?','Se reemplazar\u00e1 la lista con los jugadores por defecto.',()=>{setPlayers(sbl(DP));render();},'Restaurar','btn-red'));
    on('adm_resth',()=>mConfirm('\u00bfRestaurar historial?','Se borrar\u00e1n TODAS las jornadas guardadas. Esta acci\u00f3n no se puede deshacer.',()=>{S.hist=[];sh([]);render();},'Borrar historial','btn-red'));
    on('adm_test',function(){mConfirm('\u00bfIniciar modo prueba?','La jornada de prueba no se guarda en el historial.',function(){var _nTeams=S.cfg.nTeams||3;var _ppt=S.cfg.ppt||5;var _allPl=[].concat(S.players);for(var _i=_allPl.length-1;_i>0;_i--){var _j2=Math.floor(Math.random()*(_i+1));var _tmp=_allPl[_i];_allPl[_i]=_allPl[_j2];_allPl[_j2]=_tmp;}var _tNames=['Verde','Dorado','Naranja','Lila'];var _tColors=[CHX[0],CHX[1],CHX[2]||'#a78bfa'];var _tms=[];for(var _ti=0;_ti<_nTeams;_ti++){_tms.push({id:gid(),name:_tNames[_ti]||'Equipo '+(_ti+1),players:_allPl.slice(_ti*_ppt,(_ti+1)*_ppt).filter(Boolean),color:_tColors[_ti]||CHX[CHX.length-1]});}var _testJ={id:gid(),date:fmtDate(todayISO()),theme:'\ud83e\uddea Modo Prueba',teams:_tms,matches:[],goals:{},events:[],standings:iSt(_tms),status:'active',champion:null,mvp:null,nextMatch:null,gk:{},test:true};_waitRi=_nTeams-1;_testSavedCur=S.cur;_testMode=true;S.cur=_testJ;go('waiting');},'\ud83e\uddea Iniciar','btn-ghost');});
    on('adm_exprm',()=>{try{const arr=JSON.parse(localStorage.getItem('presumenes')||'[]');if(!arr.length){alert('Sin res\u00famenes guardados todav\u00eda.');return;}const b=new Blob([JSON.stringify(arr,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='resumenes-pachanga.json';a.click();URL.revokeObjectURL(u);}catch(e){}});
    on('adm_expjson',()=>{try{const data={hist:S.hist,cur:S.cur,players:S.players,nicks:S.nicks,cfg:S.cfg};const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='pachanga-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);}catch(e){}});
    const impFile=g('adm_impfile');if(impFile){impFile.onchange=function(e){const file=e.target.files&&e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){try{const d=JSON.parse(ev.target.result);if(!d.hist||!Array.isArray(d.hist)){alert('JSON inv\u00e1lido: falta hist[]');return;}mConfirm('\u00bfImportar backup?','Se reemplazar\u00e1n historial, jornada, jugadores y config.',function(){if(d.hist){S.hist=d.hist;sh(d.hist);}if(d.cur!==undefined){setCur(d.cur);}if(d.players&&Array.isArray(d.players)){setPlayers(d.players);}if(d.nicks){S.nicks=d.nicks;svNicks(d.nicks);}if(d.cfg){S.cfg=Object.assign({},DFLT_CFG,d.cfg);svCfg(S.cfg);}go('home');},'Importar','btn-green');}catch(ex){alert('Error al leer el archivo');}};reader.readAsText(file);};}
  }
  if(v==='jornada'){
    on('jvbk',()=>{S.view='ranks';S.rtab='hist';render();window.scrollTo(0,0);});
    on('jvedit',()=>{S.editJ=cp(S.hist[S.selJornada]);S.view='editjornada';render();window.scrollTo(0,0);});
  }
  if(v==='editjornada'){
    if(!S.admUnlocked)return;
    var ej=S.editJ;if(!ej)return;
    var _ejTh=g('ej_theme');if(_ejTh)_ejTh.oninput=function(e){if(S.editJ)S.editJ.theme=e.target.value;};
    var _ejDt=g('ej_date');if(_ejDt)_ejDt.oninput=function(e){if(S.editJ)S.editJ.date=e.target.value;};
    on('ejbk',function(){S.view='jornada';render();window.scrollTo(0,0);});
    var _ejAllPl=[];(ej.teams||[]).forEach(function(t){(t.players||[]).forEach(function(p){if(p&&_ejAllPl.indexOf(p)<0)_ejAllPl.push(p);});});_ejAllPl=sbl(_ejAllPl);
    // Partidos: +/- scores y borrar
    (ej.matches||[]).forEach(function(m,idx){
      on('ej_s1p'+idx,function(){S.editJ.matches[idx].score1=Math.min(20,(S.editJ.matches[idx].score1||0)+1);recomputeJornada(S.editJ);render();});
      on('ej_s1m'+idx,function(){S.editJ.matches[idx].score1=Math.max(0,(S.editJ.matches[idx].score1||0)-1);recomputeJornada(S.editJ);render();});
      on('ej_s2p'+idx,function(){S.editJ.matches[idx].score2=Math.min(20,(S.editJ.matches[idx].score2||0)+1);recomputeJornada(S.editJ);render();});
      on('ej_s2m'+idx,function(){S.editJ.matches[idx].score2=Math.max(0,(S.editJ.matches[idx].score2||0)-1);recomputeJornada(S.editJ);render();});
      on('ej_mdel'+idx,function(){mConfirm('\u00bfEliminar partido '+(idx+1)+'?','Se recalcular\u00e1n las posiciones.',function(){S.editJ.matches.splice(idx,1);recomputeJornada(S.editJ);render();},'Eliminar','btn-red');});
    });
    // Goleadores: +/- por jugador
    _ejAllPl.forEach(function(p,pi){
      on('ej_gp'+pi,function(){if(!S.editJ.goals)S.editJ.goals={};S.editJ.goals[p]=(S.editJ.goals[p]||0)+1;render();});
      on('ej_gm'+pi,function(){if(S.editJ.goals&&S.editJ.goals[p]>0){S.editJ.goals[p]--;if(S.editJ.goals[p]===0)delete S.editJ.goals[p];}render();});
    });
    // Agregar nuevo goleador
    on('ej_gadd',function(){var sel=g('ej_gsel');if(sel&&sel.value){var p=sel.value;if(!S.editJ.goals)S.editJ.goals={};S.editJ.goals[p]=(S.editJ.goals[p]||0)+1;render();}});
    // Campeón
    (ej.teams||[]).forEach(function(t,i){on('ej_ch'+i,function(){S.editJ.champion=t.id;render();});});
    on('ej_chno',function(){S.editJ.champion=null;render();});
    // MVP
    _ejAllPl.forEach(function(p,pi){on('ej_mvp'+pi,function(){S.editJ.mvp=p;render();});});
    on('ej_mvpno',function(){S.editJ.mvp=null;render();});
    // Guardar
    on('ej_save',function(){var nh=cp(S.hist);nh[S.selJornada]=S.editJ;setHist(nh);S.view='jornada';render();window.scrollTo(0,0);});
    // Reemplazar jugadores
    (ej.teams||[]).forEach(function(t,ti){(t.players||[]).forEach(function(p,pi){on('ejrp_'+ti+'_'+pi,function(){var inJ=[];(S.editJ.teams||[]).forEach(function(tt){(tt.players||[]).forEach(function(pp){if(pp)inJ.push(pp);});});var avail=sbl(S.players.filter(function(pp){return inJ.indexOf(pp)<0||pp===p;}));mReplacePicker(p,avail,function(newP){if(!newP||newP===p)return;var nj=cp(S.editJ);replacePlayerInJornada(nj,p,newP);S.editJ=nj;render();});});});});
  }
  if(v==='apikey'){on('akhm',()=>go('home'));const ki=g('akpi');if(ki)ki.oninput=e=>S.akval=e.target.value;on('aksv',()=>{sk_(S.akval.trim());const b=g('aksv');if(b){b.textContent='\u2713 Guardada!';b.style.background='var(--lime)'||'#86efac';b.style.color='var(--lime-d)'||'#14532d';}setTimeout(()=>go('home'),900);});on('akdl',()=>mConfirm('\u00bfBorrar la API key?','',()=>{sk_('');S.akval='';render();},'Borrar','btn-red'));}
}
function mReplacePicker(oldP,candidates,cb){var mr=document.getElementById('mr');mr.innerHTML='<div class="modal-bg" id="mbb"><div class="modal"><div class="modal-pill"></div><p style="font-size:10px;color:var(--txt2);font-weight:700;letter-spacing:1px;margin-bottom:4px">REEMPLAZAR</p><div style="font-size:18px;font-weight:800;color:var(--txt);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bor)">'+esc(nick(oldP))+'</div><p style="font-size:12px;color:var(--txt2);margin-bottom:10px">¿Por quién?</p>'+candidates.map(function(p,i){return'<button id="mrp'+i+'" class="btn" style="margin-bottom:8px;text-align:left;padding:.6rem 1rem;font-size:14px;font-weight:600;background:var(--sur2);border:1px solid var(--bor);color:var(--txt)">'+esc(nick(p))+'</button>';}).join('')+'<div style="margin-top:8px;display:flex;gap:6px"><input type="text" id="mrp_custom" placeholder="Nombre no listado..." style="flex:1;margin-bottom:0;font-size:13px"><button id="mrp_custombtn" class="btn-sm" style="white-space:nowrap;padding:7px 12px">OK</button></div><button id="mrpn" class="btn btn-ghost" style="color:var(--txt3);font-size:13px;margin-top:4px">Cancelar</button></div></div>';candidates.forEach(function(p,i){var el=document.getElementById('mrp'+i);if(el)el.onclick=function(){vib(20);hmr();cb(p);};});var cb2=document.getElementById('mrp_custombtn');if(cb2)cb2.onclick=function(){var inp=document.getElementById('mrp_custom');var v=inp?inp.value.trim():'';if(v){vib(20);hmr();cb(v);}};var cn=document.getElementById('mrpn');if(cn)cn.onclick=function(){hmr();cb(null);};var mbb=document.getElementById('mbb');if(mbb)mbb.onclick=function(e){if(e.target.id==='mbb'){hmr();cb(null);}};}
function replacePlayerInJornada(j,oldP,newP){if(!oldP||!newP||oldP===newP)return j;(j.teams||[]).forEach(function(t){if(t.players){for(var i=0;i<t.players.length;i++){if(t.players[i]===oldP)t.players[i]=newP;}}});if(j.goals&&j.goals[oldP]!==undefined){j.goals[newP]=(j.goals[newP]||0)+j.goals[oldP];delete j.goals[oldP];}(j.events||[]).forEach(function(e){if(e.player===oldP)e.player=newP;if(e.assist===oldP)e.assist=newP;});if(j.mvp===oldP)j.mvp=newP;if(j.gk){var gk2={};Object.keys(j.gk).forEach(function(k){gk2[k]=j.gk[k]===oldP?newP:j.gk[k];});j.gk=gk2;}(j.matches||[]).forEach(function(m){if(m.gk){Object.keys(m.gk).forEach(function(k){if(m.gk[k]===oldP)m.gk[k]=newP;})}});return j;}
function migratePlayerName(oldName,newName){
  if(!oldName||!newName||oldName===newName)return;
  function mj(j){
    (j.teams||[]).forEach(function(t){if(t.players){for(var i=0;i<t.players.length;i++){if(t.players[i]===oldName)t.players[i]=newName;}}});
    if(j.goals&&j.goals[oldName]!==undefined){j.goals[newName]=(j.goals[newName]||0)+j.goals[oldName];delete j.goals[oldName];}
    (j.events||[]).forEach(function(e){if(e.player===oldName)e.player=newName;});
    if(j.mvp===oldName)j.mvp=newName;
    if(j.gk){var gk2={};Object.keys(j.gk).forEach(function(k){gk2[k]=j.gk[k]===oldName?newName:j.gk[k];});j.gk=gk2;}
    (j.matches||[]).forEach(function(m){if(m.gk){Object.keys(m.gk).forEach(function(k){if(m.gk[k]===oldName)m.gk[k]=newName;});}});
    return j;
  }
  if(S.hist&&S.hist.length){var nh=S.hist.map(function(j){return mj(cp(j));});S.hist=nh;sh(nh);}
  if(S.cur){var nc=mj(cp(S.cur));setCur(nc);}
}
function saveEdit(){const ei=g('eei'),en=g('eenk');const n=(ei?ei.value.trim():S.eval_);const nk=(en?en.value.trim():S.enick);if(n){const old=S.eplist[S.eidx];const newNicks=Object.assign({},S.nicks);if(old!==n){delete newNicks[old];}if(nk){newNicks[n]=nk;}else{delete newNicks[n];}S.nicks=newNicks;svNicks(newNicks);if(old!==n)migratePlayerName(old,n);S.eplist[S.eidx]=n;S.eplist=sbl([...S.eplist]);S.eidx=null;render();}}
render();
</script>
